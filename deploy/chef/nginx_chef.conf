# ============================================================
# Chef AI - Nginx Configuration
# 添加到 /etc/nginx/sites-available/chef
# ============================================================

# Chef WebSocket Server (Deno)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chef.novarian.ai;

    # SSL certificates (use certbot to generate)
    ssl_certificate /etc/letsencrypt/live/chef.novarian.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chef.novarian.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time audio
        proxy_buffering off;
        proxy_cache off;
    }
}

# Chef Web App (Next.js)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chef-app.novarian.ai;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/chef-app.novarian.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chef-app.novarian.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR support (dev mode)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name chef.novarian.ai chef-app.novarian.ai;

    return 301 https://$host$request_uri;
}
